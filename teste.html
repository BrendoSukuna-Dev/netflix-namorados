<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resistência - Escolha o seu perfil</title>
    <style>
      :root {
        --bg-color: #0f1113;
        --text-color-primary: #e0e0e0;
        --text-color-secondary: #aaaaaa;
        --font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        --grid-gap: 15px;
        --profile-size: 80px;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        font-family: var(--font-family);
        background-color: var(--bg-color);
        color: var(--text-color-primary);
        overflow-x: hidden;
        user-select: none; /* Previne seleção de texto acidental */
      }

      /* Estilo para a imagem de fundo em destaque */
      .poster-container {
        position: relative;
        width: 100%;
        height: 55%; /* Ocupa um pouco mais da metade da tela */
        overflow: hidden;
      }

      .poster-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* Gradiente para escurecer o fundo, misturando com o resto do site */
      .poster-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 30%; /* O gradiente ocupa o fundo da imagem */
        background: linear-gradient(
          to top,
          rgba(15, 17, 19, 1),
          rgba(15, 17, 19, 0)
        );
      }

      /* Título e data do pôster */
      .title-group {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        width: 90%;
      }

      .main-title {
        font-size: 30px;
        font-weight: bold;
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #f1f1f1;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.7);
      }

      .release-date {
        font-size: 14px;
        font-weight: 300;
        margin: 5px 0 0 0;
        color: #d0d0d0;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      }

      /* Seção de escolha de perfil */
      .profile-picker-container {
        width: 100%;
        height: 45%; /* Restante da tela */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 30px; /* Espaço para o título "Escolha..." */
        box-sizing: border-box;
      }

      .prompt-text {
        font-size: 16px;
        color: var(--text-color-primary);
        margin-bottom: 25px;
        font-weight: 400;
      }

      /* Grelha de Perfis */
      .profiles-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-gap: var(--grid-gap);
        width: fit-content; /* Centraliza a grelha */
        padding: 0 var(--grid-gap); /* Margem lateral */
      }

      /* Estilo individual do Perfil */
      .profile-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        cursor: pointer;
        width: calc(var(--profile-size) + 10px);
      }

      /* Container da imagem do perfil */
      .profile-avatar-container {
        width: var(--profile-size);
        height: var(--profile-size);
        border-radius: 8px; /* Cantos arredondados, não redondos */
        overflow: hidden;
        border: 3px solid #333; /* Borda escura, não visível no exemplo, mas padrão */
        transition:
          transform 0.1s ease,
          border-color 0.1s ease;
      }

      /* Imagem real do avatar */
      .profile-avatar-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* Nome do perfil */
      .profile-name {
        margin-top: 8px;
        font-size: 12px;
        color: var(--text-color-secondary);
        font-weight: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px; /* Espaço para emoji */
      }

      /* Estilo específico para o ícone de 'Editar' */
      .edit-profile-avatar {
        width: var(--profile-size);
        height: var(--profile-size);
        border-radius: 8px;
        background-color: #555555; /* Cinza médio */
        display: flex;
        justify-content: center;
        align-items: center;
        border: 3px solid #777; /* Borda mais clara para o botão */
      }

      .edit-icon {
        color: #d0d0d0;
        font-size: 24px;
        font-weight: bold;
      }

      /* Efeito de hover/toque */
      .profile-item:active .profile-avatar-container,
      .profile-item:active .edit-profile-avatar {
        transform: scale(0.95);
        border-color: #e0e0e0;
      }

      /* Ajuste para telas muito pequenas */
      @media (max-height: 500px) {
        .poster-container {
          height: 40%;
        }
        .profile-picker-container {
          height: 60%;
          padding-top: 15px;
        }
        .prompt-text {
          margin-bottom: 15px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Parte Superior: Pôster do Filme -->
    <div class="poster-container">
      <!-- Substitua 'sua-imagem-aqui.jpg' pelo link real da imagem do pôster -->
      <img
        src="/img/Momentos/21.webp"
        alt="Pôster Resistência"
        class="poster-image"
      />
      <div class="poster-overlay"></div>
      <div class="title-group">
        <h1 class="main-title">Feliz Dia Dos Namorados!</h1>
        <p class="release-date">12 de junho</p>
      </div>
    </div>

    <!-- Parte Inferior: Escolha do Perfil -->
    <div class="profile-picker-container">
      <div class="prompt-text">Escolha o seu perfil</div>

      <div class="profiles-grid">
        <!-- Perfil 1: Gatinho -->
        <div class="profile-item">
          <div class="profile-avatar-container">
            <img
              src="/img/Perfis/perfil-andre.png"
              alt="Andréa"
              class="profile-avatar-img"
            />
          </div>
          <div class="profile-name">Andréa</div>
        </div>

        <!-- Perfil 2: Jinx -->
        <div class="profile-item">
          <div class="profile-avatar-container">
            <img
              src="/img/Perfis/perfil-sukuna.png"
              alt="Legoshi"
              class="profile-avatar-img"
            />
          </div>
          <div class="profile-name">Sukuna</div>
        </div>

        <!-- Perfil 3: Moça -->
        <div class="profile-item">
          <div class="profile-avatar-container">
            <img
              src="/img/Perfis/perfil-aninha.png"
              alt="Aninha"
              class="profile-avatar-img"
            />
          </div>
          <div class="profile-name">Aninha</div>
        </div>

        <!-- Perfil 4: CRISTAL -->
        <div class="profile-item">
          <div class="profile-avatar-container">
            <img
              src="/img/Perfis/perfil-cristal.png"
              alt="CRISTAL"
              class="profile-avatar-img"
            />
          </div>
          <div class="profile-name">CRISTAL 😂</div>
        </div>

        <!-- Perfil 5: Bruno -->
        <div class="profile-item">
          <div class="profile-avatar-container">
            <img
              src="/img/Perfis/perfil-bruno.png"
              alt="Bruno"
              class="profile-avatar-img"
            />
          </div>
          <div class="profile-name">Bruno</div>
        </div>

        <!-- Botão de Editar -->
        <div class="profile-item">
          <div class="edit-profile-avatar">
            <!-- Ícone de Lápis Simples (Unicode ou Imagem) -->
            <span class="edit-icon">&#x270E;</span>
          </div>
          <div class="profile-name">Editar</div>
        </div>
      </div>
    </div>
  </body>
</html>
