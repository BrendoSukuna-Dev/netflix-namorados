<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/logo-favicon.png" />
    <link rel="stylesheet" href="style-home.css" />
    <title>Feliz Dia Dos Namorados</title>
  </head>
  <body>
    <!-- Parte Superior: Pôster do Filme -->
    <div class="poster-container">
      <!-- Substitua 'sua-imagem-aqui.jpg' pelo link real da imagem do pôster -->
      <img
        src="/img/Momentos/21.webp"
        alt="Pôster Resistência"
        class="poster-image"
      />
      <div class="poster-overlay"></div>
      <div class="title-group">
        <h1 class="main-title">Feliz Dia Dos Namorados!</h1>
        <p class="release-date">12 de junho</p>
      </div>
    </div>

    <!-- Parte Inferior: Escolha do Perfil -->
    <div class="profile-picker-container">
      <div class="prompt-text">Escolha o seu perfil</div>

      <div class="profiles-grid">
        <!-- Perfil 1: Gatinho -->
        <div class="profile-item">
          <div class="profile-avatar-container">
            <img
              src="/img/Perfis/perfil-andre.png"
              alt="Andréa"
              class="profile-avatar-img"
            />
          </div>
          <div class="profile-name">Andréa</div>
        </div>

        <!-- Perfil 2: Jinx -->
        <div
          class="profile-item"
          onclick="window.location.href = '/index.html'"
        >
          <div class="profile-avatar-container">
            <img
              src="/img/Perfis/perfil-sukuna.png"
              alt="Legoshi"
              class="profile-avatar-img"
            />
          </div>
          <div class="profile-name">Sukuna</div>
        </div>

        <!-- Perfil 3: Moça -->
        <div class="profile-item">
          <div class="profile-avatar-container">
            <img
              src="/img/Perfis/perfil-aninha.png"
              alt="Aninha"
              class="profile-avatar-img"
            />
          </div>
          <div class="profile-name">Aninha</div>
        </div>

        <!-- Perfil 4: CRISTAL -->
        <div class="profile-item">
          <div class="profile-avatar-container">
            <img
              src="/img/Perfis/perfil-cristal.png"
              alt="CRISTAL"
              class="profile-avatar-img"
            />
          </div>
          <div class="profile-name">CRISTAL 😂</div>
        </div>

        <!-- Perfil 5: Bruno -->
        <div class="profile-item">
          <div class="profile-avatar-container">
            <img
              src="/img/Perfis/perfil-bruno.png"
              alt="Bruno"
              class="profile-avatar-img"
            />
          </div>
          <div class="profile-name">Bruno</div>
        </div>

        <!-- Botão de Editar -->
        <div class="profile-item">
          <div class="edit-profile-avatar">
            <!-- Ícone de Lápis Simples (Unicode ou Imagem) -->
            <span class="edit-icon">&#x270E;</span>
          </div>
          <div class="profile-name">Editar</div>
        </div>
      </div>
    </div>
  </body>
</html>
